<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Profile</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">

</head>
<body>

<div class="card">

    <img src="https://i.imgur.com/6VBx3io.png" class="profile-img">

    <h1>{{ username }}</h1>

    <p>{{ email }}</p>

    <div class="box">
        Joined : {{ joined }}
    </div>

    <a href="/logout" class="logout-btn">Logout</a>

</div>

</body>
</html>
